<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" href="favicon.ico">

<title>E-Commerce Product Catalog</title>
</head>
<body>

<header>

    <h1>Products</h1>
    <nav>
    <ul>
        <li><a href="index.html">🏠 Home</a></li>
        <li><a href="products.html">🛍 Products</a></li>
        <li><a href="product-details.html">📦 Details</a></li>

        <li>
<a href="#" onclick="viewCart()">
🛒 Cart (<span id="cartCount">0</span>)
</a>
</li>
    </ul>
</nav>

 <!-- Stats -->
<section class="stats">
    <div class="stat-card">
        <h2>15+</h2>
        <p>Products</p>
    </div>

    <div class="stat-card">
        <h2>1000+</h2>
        <p>Customers</p>
    </div>

    <div class="stat-card">
        <h2>50+</h2>
        <p>Brands</p>
    </div>
</section>
 </header>

 <!-- Search and Filter -->
<div class="controls">

    <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
        onkeyup="searchProducts()">

    <select id="categoryFilter" onchange="filterProducts()">
    <option value="all">All Categories</option>
    <option value="Electronics">Electronics</option>
    <option value="Fashion">Fashion</option>
    <option value="Home Essentials">Home Essentials</option>
    <option value="Books">Books</option>
</select>

</div>

<!-- Loading Message -->
<div id="loading">
    Loading products...
</div>


<!-- Products from API will appear here -->
<div id="productsContainer"></div>

 <div class="cart-section">
    <h2>🛒 Cart</h2>
    <p>Items in Cart: <span id="cartCountSection">0</span></p>

    <button onclick="viewCart()">
        View Cart
    </button>
</div>

<script src="js/api.js"></script>
<script src="script.js"></script>
</body>
</html>
